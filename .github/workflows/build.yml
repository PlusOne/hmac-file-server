name: Go CI

on:
  push:
    branches:
      - dev
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: '^1.20'

      - name: Build Server
        run: |
          cd cmd/server
          go build -o hmac-file-server ./main.go

      - name: Start Server
        run: |
          cd cmd/server
          ./hmac-file-server &
          echo $! > server.pid
        shell: bash

      - name: Wait for Server to Start
        run: sleep 5

      - name: Run Tests
        env:
          SERVER_URL: http://127.0.0.1:8080
        run: |
          cd test
          go test -v ./...

      - name: Stop Server
        run: |
          if [ -f hmac_server.pid ]; then
               PID=$(cat hmac_server.pid)
               if ps -p $PID > /dev/null; then
                   kill $PID
                   echo "Process $PID terminated successfully."
              else
                   echo "Process $PID not found or already stopped."
               fi
           else
              echo "PID file not found. Unable to stop server."
          fi
        shell: bash
        
